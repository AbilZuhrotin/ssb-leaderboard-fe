<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pelatih - SSB</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen">
    <header class="bg-gradient-to-r from-[#d00000] to-[#990000] p-10 text-white shadow-2xl relative overflow-hidden">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 relative z-10">
            <div class="flex items-center gap-5">
                <img src="assets/logo.jpg" class="w-16 h-16 rounded-full border-2 border-white object-cover shadow-lg" alt="Logo SSB">
                <div>
                    <h1 class="text-2xl font-black italic tracking-tighter uppercase leading-none">Dashboard Pelatih</h1>
                    <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest mt-1">Akun: <span class="text-white underline">Bagas Saputra</span></p>
                </div>
            </div>
            <div class="bg-black/10 backdrop-blur-md px-5 py-2 rounded-xl border border-white/20 text-xs font-bold italic">
                Sistem Manajemen v1.0
            </div>
        </div>
        <div class="absolute -right-5 -bottom-5 opacity-10 text-9xl italic font-black">⚽</div>
    </header>

    <div class="max-w-5xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 -mt-12 mb-10">
            <div class="bg-white p-5 rounded-[2rem] shadow-xl border border-slate-50 flex items-center gap-4 transform transition hover:scale-105">
                <div class="bg-blue-50 p-3 rounded-xl text-blue-900 shadow-inner">
                    <i data-lucide="users" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest leading-none mb-1">Total Pemain</p>
                    <p class="text-2xl font-black text-slate-800 leading-none">12 <span class="text-[10px] font-medium text-slate-400">Anak</span></p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-[2rem] shadow-xl border border-slate-50 flex items-center gap-4 transform transition hover:scale-105">
                <div class="bg-red-50 p-3 rounded-xl text-red-600 shadow-inner">
                    <i data-lucide="zap" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest leading-none mb-1">Sesi Latihan</p>
                    <p class="text-2xl font-black text-red-600 italic uppercase leading-none">AKTIF</p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-[2rem] shadow-xl border border-slate-50 flex items-center gap-4 transform transition hover:scale-105">
                <div class="bg-amber-50 p-3 rounded-xl text-amber-600 shadow-inner">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest leading-none mb-1">Kategori Tim</p>
                    <p class="text-2xl font-black text-amber-500 italic leading-none">U-14</p>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-4 mb-6 px-2">
            <h3 class="font-black text-slate-800 uppercase text-[10px] tracking-[0.3em]">Menu Utama</h3>
            <div class="h-[1px] flex-grow bg-slate-200 rounded-full"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="input.html" class="bg-white p-8 rounded-[2.5rem] shadow-lg group hover:bg-red-50 transition-all duration-300 text-center border border-slate-50">
                <div class="bg-slate-100 w-14 h-14 mx-auto rounded-2xl mb-4 flex items-center justify-center group-hover:bg-red-600 group-hover:text-white transition-all shadow-sm">
                    <i data-lucide="edit-3" class="w-6 h-6"></i>
                </div>
                <p class="font-black text-lg text-slate-800 tracking-tight">Input Nilai</p>
                <p class="text-[10px] text-slate-400 mt-1 font-medium">Update performa individu mingguan</p>
            </a>

            <a href="leaderboard.html" class="bg-white p-8 rounded-[2.5rem] shadow-lg group hover:bg-blue-50 transition-all duration-300 text-center border border-slate-50">
                <div class="bg-slate-100 w-14 h-14 mx-auto rounded-2xl mb-4 flex items-center justify-center group-hover:bg-blue-900 group-hover:text-white transition-all shadow-sm">
                    <i data-lucide="trophy" class="w-6 h-6"></i>
                </div>
                <p class="font-black text-lg text-slate-800 tracking-tight">Leaderboard</p>
                <p class="text-[10px] text-slate-400 mt-1 font-medium">Lihat urutan pemain terbaik U-14</p>
            </a>
        </div>

        <div class="mt-12 text-center">
            <button onclick="window.location.href='index.html'" class="text-[10px] font-black text-slate-400 hover:text-red-600 uppercase tracking-widest transition-colors flex items-center gap-2 mx-auto justify-center">
                <i data-lucide="log-out" class="w-3 h-3"></i> Keluar dari Sistem
            </button>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
