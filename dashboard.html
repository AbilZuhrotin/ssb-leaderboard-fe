<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pelatih - SSB</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen">
    <!-- Header: Kita pakai h-auto biar dia menyesuaikan isi, nggak nutupi bawahnya -->
    <header class="bg-gradient-to-r from-[#d00000] to-[#990000] p-10 text-white shadow-2xl relative overflow-hidden">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 relative z-10">
            <div class="flex items-center gap-5">
                <img src="assets/logo.jpg" class="w-16 h-16 rounded-full border-2 border-white object-cover shadow-lg"
                    alt="Logo SSB">
                <div>
                    <h1 class="text-3xl font-black leading-none text-white">Dashboard Pelatih</h1>
                    <p class="text-md font-bold opacity-80 mt-1">Selamat Datang Coach <span class="text-amber-500">Bagas
                            Saputra</span></p>
                </div>
            </div>
            <button onclick="window.location.href='index.html'"
                class="bg-black/10 backdrop-blur-md px-5 py-2 rounded-2xl border border-white/20 text-xs font-bold">
                Logout
            </button>
        </div>
        <div class="absolute -right-5 -bottom-5 opacity-10 text-9xl italic font-black">⚽</div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <!-- Statistik Cards: Nggak pakai margin negatif biar nggak naik ke header -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100 flex items-center gap-4">
                <div class="bg-blue-50 p-3 rounded-xl text-blue-900">
                    <i data-lucide="users" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-sm font-black text-slate-400 mb-1">Total Pemain</p>
                    <p class="text-2xl font-black text-slate-800">12 <span
                            class="text-xs font-medium text-slate-500">Anak</span></p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100 flex items-center gap-4">
                <div class="bg-red-50 p-3 rounded-xl text-red-600">
                    <i data-lucide="zap" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-sm font-black text-slate-400 mb-1">Sesi Latihan</p>
                    <p class="text-2xl font-black text-red-600">Aktif</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100 flex items-center gap-4">
                <div class="bg-amber-50 p-3 rounded-xl text-amber-600">
                    <i data-lucide="shield-check" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-sm font-black text-slate-400 mb-1">Kategori Tim</p>
                    <p class="text-2xl font-black text-amber-500">U-14</p>
                </div>
            </div>
        </div>

        <h3 class="font-black text-slate-800 text-lg mb-6 px-2 opacity-50">Pilih aktivitas
        </h3>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="input.html"
                class="bg-white p-8 rounded-[2.5rem] shadow-md hover:shadow-xl hover:bg-red-50 transition-all text-center border border-slate-100 group">
                <div
                    class="bg-slate-50 w-16 h-16 mx-auto rounded-2xl mb-4 flex items-center justify-center group-hover:bg-red-600 group-hover:text-white transition-colors">
                    <i data-lucide="edit-3" class="w-6 h-6"></i>
                </div>
                <p class="font-black text-lg text-slate-800">Input Nilai</p>
                <p class="text-sm text-slate-400 mt-1 font-medium">Update performa mingguan</p>
            </a>

            <a href="leaderboard.html"
                class="bg-white p-8 rounded-[2.5rem] shadow-md hover:shadow-xl hover:bg-blue-50 transition-all text-center border border-slate-100 group">
                <div
                    class="bg-slate-50 w-16 h-16 mx-auto rounded-2xl mb-4 flex items-center justify-center group-hover:bg-blue-900 group-hover:text-white transition-colors">
                    <i data-lucide="trophy" class="w-6 h-6"></i>
                </div>
                <p class="font-black text-lg text-slate-800">Leaderboard</p>
                <p class="text-sm text-slate-400 mt-1 font-medium">Pantau klasemen pemain terbaik</p>
            </a>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>

</html>
