<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Absensi SSB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-4 gap-6">

    <!-- Tambahkan id="id-card" di container kartu -->
    <div id="id-card" class="w-full max-w-[320px] bg-white rounded-3xl shadow-xl overflow-hidden relative border border-slate-200 aspect-[2/3] flex flex-col justify-between p-6">
        <div class="absolute top-0 left-0 w-24 h-24 bg-gradient-to-br from-blue-500 to-transparent opacity-20" style="clip-path: polygon(0 0, 100% 0, 0 100%);"></div>
        <div class="absolute bottom-0 right-0 w-24 h-24 bg-gradient-to-tl from-blue-600 to-transparent opacity-30" style="clip-path: polygon(100% 100%, 100% 0, 0 100%);"></div>

        <div class="text-center z-10">
            <img src="assets/logo.png" class="w-10 h-10 mx-auto mb-2 rounded-full">
            <h2 class="text-sm font-black text-slate-800 uppercase tracking-tight">SSB Susukan Youth United</h2>
        </div>

        <div class="text-center z-10 my-4">
            <div class="w-20 h-20 bg-blue-900 rounded-full mx-auto mb-3 flex items-center justify-center border-2 border-slate-100 shadow-inner overflow-hidden">
                <i data-lucide="user" class="w-10 h-10 text-white/60"></i>
            </div>
            <h3 class="text-base font-extrabold text-slate-800">Bagus Prayoga</h3>
            <p class="text-xs text-slate-500 font-bold uppercase mt-0.5">U-14</p>
        </div>

        <div class="flex justify-center items-center z-10 mb-2">
            <div id="qrcode" class="p-2 bg-white border-2 border-slate-100 rounded-xl shadow-sm"></div>
        </div>
    </div>

    <!-- Tambahkan Aksi Tombol di Bawah Kartu -->
    <div class="flex gap-3 w-full max-w-[320px]">
        <a href="profile.html" class="flex-1 bg-white border border-slate-200 text-slate-600 font-bold py-3 rounded-2xl text-xs text-center shadow-sm flex items-center justify-center gap-1">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali
        </a>
        <button id="download-id-btn" class="flex-1 bg-[#1d3557] text-white font-bold py-3 rounded-2xl text-xs shadow-md flex items-center justify-center gap-1 hover:bg-opacity-90">
            <i data-lucide="download" class="w-4 h-4"></i> Simpan Gambar
        </button>
    </div>

    <script>
        // Render QR Code
        new QRCode(document.getElementById("qrcode"), {
            text: "SSB-001", 
            width: 120,
            height: 120,
            colorDark : "#1e293b",
            colorLight : "#ffffff"
        });

        // Logic Download Kartu Pelajar
        document.getElementById('download-id-btn').addEventListener('click', function() {
            const card = document.getElementById('id-card');
            this.innerText = "Menyimpan...";
            
            html2canvas(card, {
                useCORS: true,
                scale: 3 // Skala 3 biar barcode-nya super tajam pas di-scan pelatih
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Kartu_Pelajar_Bagus_Prayoga.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                this.innerHTML = '<i data-lucide="download" class="w-4 h-4"></i> Simpan Gambar';
                lucide.createIcons();
            });
        });

        lucide.createIcons();
    </script>
</body>
</html>
