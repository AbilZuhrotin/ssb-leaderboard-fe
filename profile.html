<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - SSB Dashboard</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen pb-28">

    <header class="bg-[#1d3557] p-6 text-white shadow-lg relative overflow-hidden mb-8">
        <div class="absolute right-[-20px] top-[-20px] opacity-10">
            <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z" />
            </svg>
        </div>
        <div class="max-w-md mx-auto flex items-center gap-4">
            <img src="assets/logo.png" alt="Logo SSB" class="w-12 h-12 rounded-full border-2 border-white/20">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">SSB Dashboard</h1>
                <p class="text-xs text-amber-400 font-bold uppercase tracking-widest">Dashboard Player</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 text-center">
        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight mb-4">Profil</h2>

        <!-- Avatar Besar -->
        <div class="w-28 h-28 mx-auto rounded-full bg-[#1d3557] text-white flex items-center justify-center border-4 border-white shadow-md mb-6 overflow-hidden">
            <i data-lucide="user" class="w-14 h-14"></i>
        </div>

        <!-- Form Read-Only -->
        <div class="space-y-4 text-left mb-6">
            <div>
                <label class="block text-xs font-bold text-[#1d3557] uppercase mb-1 ml-2">Nama</label>
                <input type="text" value="Bagus Prayoga" disabled class="w-full bg-white px-5 py-3.5 border border-slate-200 rounded-2xl font-bold text-slate-700 shadow-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-[#1d3557] uppercase mb-1 ml-2">No Hp Ortu</label>
                <input type="text" value="+62" disabled class="w-full bg-white px-5 py-3.5 border border-slate-200 rounded-2xl font-bold text-slate-700 shadow-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-[#1d3557] uppercase mb-1 ml-2">Kelas</label>
                <input type="text" value="U-14" disabled class="w-full bg-white px-5 py-3.5 border border-slate-200 rounded-2xl font-bold text-slate-700 shadow-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-[#1d3557] uppercase mb-1 ml-2">Bergabung Sejak</label>
                <input type="text" value="10/06/2018" disabled class="w-full bg-white px-5 py-3.5 border border-slate-200 rounded-2xl font-bold text-slate-700 shadow-sm">
            </div>
        </div>

        <!-- Tombol Aksi -->
        <div class="flex gap-4">
            <a href="id-card.html" class="flex-1 bg-white border border-slate-200 text-slate-700 font-bold py-3.5 rounded-2xl text-xs shadow-sm flex items-center justify-center gap-1.5">
                <i data-lucide="download" class="w-4 h-4"></i> Download Kartu Pelajar
            </a>
            <button class="flex-1 bg-white border border-red-200 text-red-600 font-bold py-3.5 rounded-2xl text-xs shadow-sm flex items-center justify-center gap-1.5 hover:bg-red-50">
                <i data-lucide="log-out" class="w-4 h-4"></i> Logout
            </button>
        </div>

        <p class="text-[10px] text-slate-300 font-bold mt-8 uppercase tracking-wider">SSB Leaderboard V0.1</p>
    </main>

    <!-- Bottom Nav -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-50">
        <div class="flex justify-around items-center h-20 max-w-md mx-auto px-4">
            <a href="leaderboard.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-[#1d3557]">
                <i data-lucide="award" class="w-6 h-6"></i>
            </a>
            <a href="player-card.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-[#1d3557]">
                <i data-lucide="contact" class="w-6 h-6"></i>
            </a>
            <a href="analytics.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-[#1d3557]">
                <i data-lucide="trending-up" class="w-6 h-6"></i>
            </a>
            <a href="profile.html" class="flex flex-col items-center p-2 text-[#1d3557] bg-slate-100 rounded-full">
                <i data-lucide="user" class="w-6 h-6"></i>
            </a>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
