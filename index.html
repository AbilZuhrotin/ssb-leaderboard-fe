<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSB Leaderboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body class="bg-gradient-to-br from-[#d00000] to-[#1d3557] min-h-screen flex items-center justify-center p-4 fade-in">
  <div class="bg-white/95 backdrop-blur-sm p-8 rounded-[2rem] shadow-2xl w-full max-w-sm border border-white/20">
    <div class="text-center mb-8">
      <img src="assets/logo.jpg" class="w-20 h-20 mx-auto rounded-full border-4 border-red-600 mb-4 shadow-lg object-cover">
      <h1 class="text-2xl font-black text-slate-800 tracking-tight">SSB DASHBOARD</h1>
      <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">U-14 Performance System</p>
    </div>

    <div class="space-y-4">
      <div class="form-control">
        <input type="text" id="user" placeholder="Username" class="input input-bordered w-full bg-slate-50 border-slate-200 focus:border-red-600">
      </div>
      
      <div class="form-control">
        <select id="role" class="select select-bordered w-full bg-slate-50 border-slate-200">
          <option value="pelatih">⚽ Coach Access</option>
          <option value="siswa">🏃 Player Access</option>
        </select>
      </div>

      <button onclick="login()" class="btn btn-ssb bg-red-600 hover:bg-red-700 border-none text-white w-full shadow-lg mt-4">
        MASUK SEKARANG
      </button>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
