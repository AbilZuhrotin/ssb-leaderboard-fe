<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSB Leaderboard - Klasemen U-14</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-28">

    <!-- Header Biru Tua Khas Player -->
    <header class="bg-[#1d3557] p-6 text-white shadow-lg relative overflow-hidden mb-8">
        <div class="absolute right-[-20px] top-[-20px] opacity-10">
            <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z" />
            </svg>
        </div>
        <div class="max-w-md mx-auto flex items-center gap-4">
            <img src="assets/logo.png" alt="Logo SSB" class="w-12 h-12 rounded-full border-2 border-white/20">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">SSB Dashboard</h1>
                <p class="text-xs text-amber-400 font-bold uppercase tracking-widest">Dashboard Player</p>
            </div>
        </div>
    </header>

    <!-- Main Container (Rapi terpusat) -->
    <main class="max-w-md mx-auto px-4 space-y-3">

        <!-- ================= RANK 01 (Spesial Box Emas) ================= -->
        <div class="bg-white p-5 rounded-3xl border-2 border-amber-400 shadow-[0_8px_20px_rgba(245,158,11,0.06)] flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-11 h-9 bg-gradient-to-br from-amber-400 to-yellow-500 rounded-xl flex items-center justify-center text-white font-black italic shadow-sm text-sm">
                    01
                </div>
                <div>
                    <h3 class="font-extrabold text-slate-800 text-base uppercase tracking-tight">Bagus Prayoga</h3>
                    <p class="text-[9px] font-bold text-amber-600 tracking-widest uppercase">Striker / CF</p>
                </div>
            </div>
            <div class="text-right">
                <span class="text-2xl font-black text-[#1d3557] italic">98.5</span>
            </div>
        </div>

        <!-- ================= RANK 02 Ke Bawah (Turun lurus semua) ================= -->
        <div id="leaderboard-list" class="space-y-2.5">
            
            <!-- Rank 02 -->
            <div class="bg-white py-4 px-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-sm font-black text-slate-300 italic w-6">02</span>
                    <div>
                        <span class="font-bold text-slate-700 text-sm uppercase tracking-tight block">Dimas Anggara</span>
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Midfielder</p>
                    </div>
                </div>
                <span class="font-black text-[#1d3557] text-base italic">92.1</span>
            </div>

            <!-- Rank 03 -->
            <div class="bg-white py-4 px-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-sm font-black text-amber-600/30 italic w-6">03</span>
                    <div>
                        <span class="font-bold text-slate-700 text-sm uppercase tracking-tight block">Rizky Fauzi</span>
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Winger</p>
                    </div>
                </div>
                <span class="font-black text-[#1d3557] text-base italic">89.4</span>
            </div>

            <!-- Rank 04 -->
            <div class="bg-white py-4 px-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-sm font-black text-slate-300 italic w-6">04</span>
                    <div>
                        <span class="font-bold text-slate-600 text-sm uppercase tracking-tight block">Eko Prasetyo</span>
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Defender</p>
                    </div>
                </div>
                <span class="font-black text-[#1d3557] text-base italic">85.0</span>
            </div>

            <!-- Rank 05 -->
            <div class="bg-white py-4 px-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-sm font-black text-slate-300 italic w-6">05</span>
                    <div>
                        <span class="font-bold text-slate-600 text-sm uppercase tracking-tight block">Fajar Siddiq</span>
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Goalkeeper</p>
                    </div>
                </div>
                <span class="font-black text-[#1d3557] text-base italic">82.3</span>
            </div>

            <!-- Rank 06 -->
            <div class="bg-white py-4 px-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-sm font-black text-slate-300 italic w-6">06</span>
                    <div>
                        <span class="font-bold text-slate-600 text-sm uppercase tracking-tight block">Genta Alamsyah</span>
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Midfielder</p>
                    </div>
                </div>
                <span class="font-black text-[#1d3557] text-base italic">80.1</span>
            </div>

            <!-- Rank 07 -->
            <div class="bg-white py-4 px-5 rounded-2xl border border-slate-100 shadow-sm flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <span class="text-sm font-black text-slate-300 italic w-6">07</span>
                    <div>
                        <span class="font-bold text-slate-600 text-sm uppercase tracking-tight block">Hadi Pratama</span>
                        <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Defender</p>
                    </div>
                </div>
                <span class="font-black text-[#1d3557] text-base italic">79.5</span>
            </div>

        </div>
    </main>

    <!-- Bottom Navigation Bar Bersama (Tetap Biru) -->
    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-50">
        <div class="flex justify-around items-center h-20 max-w-md mx-auto px-4">
            <a href="leaderboard.html" class="flex flex-col items-center p-2 text-[#1d3557] bg-slate-100 rounded-full">
                <i data-lucide="award" class="w-6 h-6"></i>
            </a>
            <a href="player-card.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-[#1d3557]">
                <i data-lucide="contact" class="w-6 h-6"></i>
            </a>
            <a href="analytics.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-[#1d3557]">
                <i data-lucide="trending-up" class="w-6 h-6"></i>
            </a>
            <a href="profile.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-[#1d3557]">
                <i data-lucide="user" class="w-6 h-6"></i>
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
