<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Performa - SSB</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen">
    <header class="bg-gradient-to-r from-[#d00000] to-[#990000] p-12 text-white shadow-2xl relative overflow-hidden">
        <div class="max-w-4xl mx-auto flex items-center gap-6 relative z-10">
            <button onclick="history.back()" class="bg-white/20 p-3 rounded-2xl hover:bg-white/40 transition-all shadow-lg">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </button>
            <div>
                <h1 class="text-3xl font-black leading-none">Input Performa</h1>
                <p class="text-sm opacity-70 font-bold">Evaluasi Pemain Mingguan</p>
            </div>
        </div>
    </header>

    <div class="max-w-4xl mx-auto p-6 -mt-10 relative z-20 mt-5">
        <div class="glass-card p-8 md:p-12 rounded-[3rem] shadow-2xl space-y-8">
            
            <div class="form-control">
                <label class="label mb-2"><span class="text-kg font-medium text-slate-400">Target Pemain</span></label>
                <div class="relative">
                    <select class="select select-bordered w-full bg-slate-50 rounded-2xl pl-12 font-bold focus:border-red-600 focus:ring-0">
                        <option disabled selected>Cari Nama Pemain...</option>
                        <option>Bagus Prayoga</option>
                        <option>Dimas Anggara</option>
                        <option>Rizky Fauzi</option>
                        <option>Eko Prasetyo</option>
                        <option>Fajar Siddiq</option>
                    </select>
                    <i data-lucide="user" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="form-control">
                    <label class="label mb-2"><span class="text-kg font-medium text-slate-400">Dribbling</span></label>
                    <div class="relative">
                        <input type="number" placeholder="1-100" class="input input-bordered w-full bg-slate-50 rounded-2xl pl-12 font-bold focus:border-red-600">
                        <i data-lucide="zap" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-red-500"></i>
                    </div>
                </div>
                <div class="form-control">
                    <label class="label mb-2"><span class="text-kg font-medium text-slate-400">Passing</span></label>
                    <div class="relative">
                        <input type="number" placeholder="1-100" class="input input-bordered w-full bg-slate-50 rounded-2xl pl-12 font-bold focus:border-red-600">
                        <i data-lucide="move-right" class="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-blue-500"></i>
                    </div>
                </div>
            </div>

            <div class="form-control bg-slate-50 p-6 rounded-[2rem] border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-kg font-medium text-slate-400">Shooting Power</span>
                    <span class="bg-red-100 text-red-600 px-4 py-1 rounded-full text-xs font-black italic">80%</span>
                </div>
                <input type="range" min="0" max="100" value="80" class="range range-error range-sm">
                <div class="w-full flex justify-between text-md px-2 mt-2 font-medium text-slate-400">
                    <span>Low</span>
                    <span>Medium</span>
                    <span>Max</span>
                </div>
            </div>

            <div class="flex flex-col gap-4 pt-6">
                <button onclick="alert('Berhasil! Data performa pemain telah diperbarui.'); history.back()" class="btn bg-[#d00000] hover:bg-[#990000] border-none text-white h-16 rounded-xl text-lg font-bold shadow-xl shadow-red-200">
                    Simpan Performa
                </button>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
