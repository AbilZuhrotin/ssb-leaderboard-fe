<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSB Card - Player Dashboard</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .fifa-card-red {
            background: linear-gradient(180deg, #1a1a1a 0%, #780000 100%);
            clip-path: polygon(50% 0%, 100% 15%, 100% 85%, 50% 100%, 0% 85%, 0% 15%);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen pb-28">

    <header class="bg-[#1d3557] p-6 text-white shadow-lg relative overflow-hidden mb-8">
        <div class="absolute right-[-20px] top-[-20px] opacity-10">
            <svg width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z" />
            </svg>
        </div>
        <div class="max-w-md mx-auto flex items-center gap-4">
            <img src="assets/logo.png" alt="Logo SSB" class="w-12 h-12 rounded-full border-2 border-white/20">
            <div>
                <h1 class="text-xl font-extrabold tracking-tight">SSB Dashboard</h1>
                <p class="text-xs text-amber-400 font-bold uppercase tracking-widest">Dashboard Player</p>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 text-center">
        <h2 class="text-xl font-black text-slate-800 uppercase tracking-tight mb-6">SSB Card</h2>

        <div id="fifa-card"
            class="fifa-card-red w-full max-w-[300px] mx-auto px-8 pt-12 pb-12 text-white shadow-xl mb-6">
            <div class="flex justify-between items-start w-full mb-2 px-2 py-4">
                <div class="text-left">
                    <!-- DATA SUPABASE: Rating & Posisi -->
                    <div id="card-rating" class="text-4xl font-black italic leading-none">95</div>
                    <div id="card-position" class="text-[10px] font-bold text-red-400 uppercase tracking-wider mt-1">FW
                    </div>
                </div>
                <!-- FIX KOTAK U-14: Menggunakan leading-6 dan h-6 agar teks terkunci mati di tengah secara vertikal -->
                <div id="card-age-group"
                    class="text-[11px] font-black text-white px-2.5 h-6 flex items-center justify-center pb-1 rounded italic tracking-tight text-center">
                    U-14
                </div>
            </div>

            <div
                class="w-24 h-24 mx-auto rounded-full bg-slate-800/50 border-2 border-red-500 overflow-hidden mb-3 flex items-center justify-center">
                <img id="card-avatar" src="assets/default-user.png" class="w-full h-full object-cover hidden">
                <i id="card-avatar-icon" data-lucide="user" class="w-12 h-12 text-white/40"></i>
            </div>

            <h3 id="card-name" class="text-lg font-extrabold uppercase italic tracking-tight mb-2">Bagus Prayoga</h3>
            <div class="w-12 h-[2px] bg-red-500 mx-auto mb-4 opacity-60"></div>

            <div class="grid grid-cols-2 gap-x-6 gap-y-2 text-xs font-bold px-2">
                <div class="flex justify-between border-b border-white/10 pb-1">
                    <span class="opacity-60">Pass</span><span id="stat-pass">90</span>
                </div>
                <div class="flex justify-between border-b border-white/10 pb-1">
                    <span class="opacity-60">Fisik</span><span id="stat-fisik">89</span>
                </div>
                <div class="flex justify-between border-b border-white/10 pb-1">
                    <span class="opacity-60">Sho</span><span id="stat-sho">93</span>
                </div>
                <div class="flex justify-between border-b border-white/10 pb-1">
                    <span class="opacity-60">Sta</span><span id="stat-sta">98</span>
                </div>
                <div class="flex justify-between border-b border-white/10 pb-1">
                    <span class="opacity-60">Dri</span><span id="stat-dri">97</span>
                </div>
                <div class="flex justify-between border-b border-white/10 pb-1">
                    <span class="opacity-60">Agi</span><span id="stat-agi">89</span>
                </div>
            </div>

            <div class="mt-6 flex flex-col items-center gap-1 opacity-80">
                <img src="assets/logo.png" class="w-6 h-6 rounded-full">
                <p class="text-[8px] font-bold tracking-widest uppercase">SSB Susukan Youth United</p>
            </div>
        </div>

        <div class="flex justify-center w-full px-2">
            <button id="download-btn"
                class="w-full max-w-[300px] bg-white border border-slate-200 text-slate-700 font-bold py-3.5 px-6 rounded-2xl shadow-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-2 text-sm">
                <i data-lucide="download" class="w-4 h-4"></i> Download SSB Card
            </button>
        </div>
    </main>

    <div
        class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-50">
        <div class="flex justify-around items-center h-20 max-w-md mx-auto px-4">
            <a href="leaderboard.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-[#1d3557]">
                <i data-lucide="award" class="w-6 h-6"></i>
            </a>
            <a href="player-card.html" class="flex flex-col items-center p-2 text-[#1d3557] bg-slate-100 rounded-full">
                <i data-lucide="contact" class="w-6 h-6"></i>
            </a>
            <a href="analytics.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-[#1d3557]">
                <i data-lucide="trending-up" class="w-6 h-6"></i>
            </a>
            <a href="profile.html" class="flex flex-col items-center p-2 text-slate-400 hover:text-[#1d3557]">
                <i data-lucide="user" class="w-6 h-6"></i>
            </a>
        </div>
    </div>

    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
    <script>
        // Logika download dipicu di sini Bil
        document.getElementById('download-btn').addEventListener('click', function () {
            const card = document.getElementById('fifa-card');
            this.innerText = "Downloading...";

            html2canvas(card, {
                useCORS: true,
                backgroundColor: null,
                scale: 3
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'SSB_Card_Bagus_Prayoga.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                this.innerHTML = '<i data-lucide="download" class="w-4 h-4"></i> Download SSB Card';
                lucide.createIcons();
            });
        });
    </script>
</body>

</html>
